# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3.json
global:
  checkNewVersion: true
  sendAnonymousUsage: false

log:
  level: INFO
  format: common

accessLog: {}

api:
  dashboard: true
  insecure: true

entrypoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: stepca

providers:
  # File Provider (For non-containerized host services)
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true
  # Docker Provider
  docker:
    network: proxy
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  # Kubernetes Ingress Provider
  kubernetesIngress:
    endpoint: "https://<KUBERNETES_HOST>:6443"
    token: "/etc/traefik/k8s/token"
    certAuthFilePath: "/etc/traefik/k8s/ca.crt"
  # Kubernetes CRD Provider (IngressRoute, Middlewares)
  kubernetesCRD:
    endpoint: "https://<KUBERNETES_HOST>:6443"
    token: "/etc/traefik/k8s/token"
    certAuthFilePath: "/etc/traefik/k8s/ca.crt"
    allowCrossNamespace: true
  # Kubernetes Gateway API Provider
  kubernetesGateway:
    endpoint: "https://<KUBERNETES_HOST>:6443"
    token: "/etc/traefik/k8s/token"
    certAuthFilePath: "/etc/traefik/k8s/ca.crt"

# Certificate Resolvers
certificatesResolvers:
  stepca:
    acme:
      caServer: "https://step-ca:9000/acme/acme/directory"
      email: "admin@homelab"
      storage: "/step/acme.json"
      httpChallenge:
        entryPoint: web
