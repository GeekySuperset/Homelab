services:
  sonarqube:
    image: sonarqube:26.4.0.121862-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      - sonarqube-postgres
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    networks:
      - proxy
      - sonarqube-db
    volumes:
      - sonarqube_data:/opt/sonarqube/data:rw
      - sonarqube_logs:/opt/sonarqube/logs:rw
      - sonarqube_extensions:/opt/sonarqube/extensions:rw
    labels:
      # Traefik
      - traefik.enable=true
      - traefik.http.services.sonarqube.loadbalancer.server.port=9000
      - traefik.http.routers.sonarqube.rule=Host(`sonarqube.homelab`)
      - traefik.http.routers.sonarqube.service=sonarqube
      - traefik.http.routers.sonarqube.entrypoints=websecure
      # Homepage
      - homepage.group=Development
      - homepage.name=SonarQube
      - homepage.icon=sonarqube.png
      - homepage.href=https://sonarqube.homelab
      - homepage.description=Code Quality Analysis

  sonarqube-postgres:
    image: postgres:15
    container_name: sonarqube-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: sonar
    networks:
      - sonarqube-db
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data:rw

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_postgres_data:

networks:
  proxy:
    external: true
  sonarqube-db:
    internal: true