services:
  gitea:
    image: gitea/gitea:1.25
    container_name: gitea
    restart: unless-stopped
    depends_on:
      - gitea-postgres
    networks:
      - proxy
      - gitea-db
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD}
      - GITEA__server__DOMAIN=gitea.homelab
      - GITEA__server__ROOT_URL=https://gitea.homelab
      - GITEA__server__HTTP_PORT=3000
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__security__INSTALL_LOCK=true
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - gitea_data:/data:rw
    labels:
      # Traefik
      - traefik.enable=true
      - traefik.http.services.gitea.loadbalancer.server.port=3000
      - traefik.http.routers.gitea.rule=Host(`gitea.homelab`)
      - traefik.http.routers.gitea.service=gitea
      - traefik.http.routers.gitea.entrypoints=websecure
      # Homepage
      - homepage.group=Development
      - homepage.name=Gitea
      - homepage.icon=gitea.png
      - homepage.href=https://gitea.homelab
      - homepage.description=Git Repository Manager

  gitea-postgres:
    image: postgres:14
    container_name: gitea-postgres
    restart: unless-stopped
    networks:
      - gitea-db
    environment:
      - POSTGRES_DB=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=${GITEA_DB_PASSWORD}
    volumes:
      - gitea_postgres_data:/var/lib/postgresql/data:rw

volumes:
  gitea_data:
  gitea_postgres_data:

networks:
  proxy:
    external: true
  gitea-db:
    internal: true
